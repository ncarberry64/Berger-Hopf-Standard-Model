name: Bug report
description: Report a reproducible software, CLI, artifact, or documentation defect.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve BHSM. Please do not include secrets or private data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest command, input, or sequence that reproduces the problem.
      render: shell
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Version or commit
      placeholder: v1.1.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Python version, and relevant optional runtimes.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: I removed secrets, credentials, and private data.
          required: true
